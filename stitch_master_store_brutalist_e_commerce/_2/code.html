<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                    "on-primary-fixed-variant": "#00419e",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#c9a810",
                    "outline": "#727786",
                    "on-secondary": "#ffffff",
                    "secondary-container": "#8455ef",
                    "outline-variant": "#c2c6d7",
                    "primary-fixed-dim": "#b1c5ff",
                    "surface-container-lowest": "#ffffff",
                    "on-primary-container": "#fdfaff",
                    "surface": "#fcf8ff",
                    "error": "#ba1a1a",
                    "on-tertiary-container": "#4c3e00",
                    "secondary-fixed": "#e9ddff",
                    "secondary-fixed-dim": "#d0bcff",
                    "background": "#fcf8ff",
                    "surface-bright": "#fcf8ff",
                    "on-secondary-fixed-variant": "#5516be",
                    "on-secondary-fixed": "#23005c",
                    "on-primary": "#ffffff",
                    "on-error": "#ffffff",
                    "primary": "#0054c8",

                    "surface-container-low": "#f6f2fa",
                    "tertiary": "#705d00",
                    "on-surface": "#1b1b20",

                    "surface-tint": "#0057ce",

                    "on-primary-fixed": "#001946",
                    "surface-variant": "#e4e1e9",
                    "on-background": "#1b1b20",
                    "surface-container-highest": "#e4e1e9",

            "borderRadius": {

            "fontFamily": {

<style>
        body {
            background-color: #fcf8ff;
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
        }

        .brutalist-shadow {
            box-shadow: 4px 4px 0px #0A0A0F;
        }

        .brutalist-button-active:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px #0A0A0F;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Grid Background Pattern */
        .bg-grid {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, #e4e1e9 1px, transparent 1px),
                linear-gradient(to bottom, #e4e1e9 1px, transparent 1px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background flex items-center justify-center min-h-screen p-md relative overflow-hidden">
<!-- Background Decoration -->
<div class="absolute inset-0 bg-grid -z-10"></div>
<div class="absolute top-[-50px] right-[-50px] w-64 h-64 border- border-on-background rotate-12 opacity-10"></div>
<!-- Login Container -->
<main class="w-full max-w-[450px] z-10">
<!-- Brutalist Login Card -->
<div class="bg-surface border-[4px] border-on-background brutalist-shadow p-lg flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-lg text-center">
<h1 class="font-display-xl text-headline-md md:text-display-xl text-on-background leading-none select-none tracking-tighter">
                    مـاستر <br/> ستور
                </h1>
<div class="h-1 w-full bg-on-background mt-xs"></div>
</div>
<!-- Form -->
<form action="#" class="w-full space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold block text-on-surface" for="email">
                        الإيميل
                    </label>
<div class="relative">
<input class="w-full px-md py-sm border-[3px] border-on-background bg-surface-container-lowest focus:ring-0 focus:outline-none focus:bg-primary-fixed transition-colors font-body-md text-body-md placeholder:text-outline-variant" id="email" placeholder="example@master.com" type="email"/>
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">alternate_email</span>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-bold text-label-bold block text-on-surface" for="password">
                        الباسورد
                    </label>
<div class="relative">
<input class="w-full px-md py-sm border-[3px] border-on-background bg-surface-container-lowest focus:ring-0 focus:outline-none focus:bg-primary-fixed transition-colors font-body-md text-body-md placeholder:text-outline-variant" id="password" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute left-md top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
</div>
</div>
<!-- Forgot Link -->
<div class="flex justify-end">
<a class="font-label-bold text-label-bold text-primary hover:underline transition-all" href="#">
                        نسيت الباسورد؟
                    </a>
</div>
<!-- CTA Button -->
<button class="w-full bg-primary-container text-on-primary-container border-[3px] border-on-background py-md font-headline-md text-headline-md brutalist-shadow brutalist-button-active transition-all cursor-pointer" type="submit">
                    تسجيل الدخول
                </button>
</form>
<!-- Bottom Divider -->
<div class="w-full h-[3px] bg-on-background my-lg"></div>
<!-- Social/Extra Links -->
<div class="w-full flex flex-col items-center gap-md">
<a class="font-label-bold text-label-bold flex items-center gap-xs text-on-surface hover:text-secondary transition-colors" href="#">
<span class="material-symbols-outlined">person_add</span>
                    عمل حساب جديد
                </a>
</div>
</div>
<!-- Footer Text -->
<p class="text-center mt-md font-label-bold text-label-bold text-on-surface-variant opacity-60">
            © 2024 MASTER STORE - All Rights Reserved
        </p>
</main>
<!-- Visual Accents (Brutalist style floating shapes) -->
<div class="hidden lg:block absolute bottom-12 left-12 w-32 h-32 bg-tertiary-fixed border-[3px] border-on-background brutalist-shadow -rotate-6"></div>
<div class="hidden lg:block absolute top-12 left-24 w-16 h-16 bg-error-container border-[3px] border-on-background brutalist-shadow rotate-12"></div>
<script>
        // Simple Interaction logic for button movement
        const btn = document.querySelector('button[type="submit"]');
        btn.addEventListener('mousedown', () => {
            btn.classList.remove('brutalist-shadow');
        });
        btn.addEventListener('mouseup', () => {
            btn.classList.add('brutalist-shadow');
        });
        btn.addEventListener('mouseleave', () => {
            btn.classList.add('brutalist-shadow');
        });

        // Focus handling for inputs to change background color
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').classList.remove('text-primary');
            });
        });
    </script>
</body></html>
