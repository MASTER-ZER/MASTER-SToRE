<script>
        // Simple Interaction logic for Neo-Brutalist "press" feel
        const nextBtn = document.querySelector('button[type="submit"]');
        if(nextBtn) {
            nextBtn.addEventListener('mousedown', () => {
                nextBtn.style.transform = 'translate(4px, 4px)';
                nextBtn.style.boxShadow = 'none';
            });
            nextBtn.addEventListener('mouseup', () => {
                nextBtn.style.transform = '';
                nextBtn.style.boxShadow = '4px 4px 0px #1B1B20';
            });
        }

        // Input Focus Visual Effects
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('div').classList.add('translate-x-1', 'translate-y-1');
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('div').classList.remove('translate-x-1', 'translate-y-1');
            });
        });
    </script>
